---
- name: Check if IosevkaTerm font is installed
  ansible.builtin.stat:
    path: "{{ share_dir }}/fonts/{{ font.name }}"
  register: font_installed

- name: Install font if not present
  when: not font_installed.stat.exists
  block:
    - name: Create font directory
      ansible.builtin.file:
        path: "{{ share_dir }}/fonts/{{ font.name }}"
        state: directory
        mode: "0755"

    - name: Download font zip file
      ansible.builtin.get_url:
        url: "{{ font.url }}"
        dest: "/tmp/{{ font.name }}.zip"
        mode: "0644"

    - name: Unzip font file
      ansible.builtin.unarchive:
        src: "/tmp/{{ font.name }}.zip"
        dest: "{{ share_dir }}/fonts/{{ font.name }}"
      notify: Update font cache
